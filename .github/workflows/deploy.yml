name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache Maven deps
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('deps.edn') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Install Clojure CLI
        run: |
          curl -L -O https://github.com/clojure/brew-install/releases/latest/download/linux-install.sh
          chmod +x linux-install.sh
          sudo bash linux-install.sh

      - name: Install npm deps
        run: npm ci

      - name: Build
        run: npx shadow-cljs release app

      - name: Build CSS
        run: npx esbuild src/main/ogres/app/resource/root.css --outfile=web/release/ogres.app.css --loader:.svg=dataurl --bundle --minify

      - name: Prepare release/latest
        run: |
          mkdir -p web/release/latest
          for item in web/release/*; do
            [ "$(basename "$item")" != "latest" ] && cp -r "$item" web/release/latest/
          done
          echo "Contents of web/release/latest:"
          ls web/release/latest/

      - name: Deploy to server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.OGRE_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 157.245.221.1 >> ~/.ssh/known_hosts
          # site/web/ first (marketing assets: manifest, media, styles)
          rsync -avz -e "ssh -i ~/.ssh/deploy_key" \
            site/web/ root@157.245.221.1:/home/nikiliko/htdocs/ogre-vsd/
          # web/ second — its index.html wins at root (VTT bootstrap)
          rsync -avz -e "ssh -i ~/.ssh/deploy_key" \
            web/ root@157.245.221.1:/home/nikiliko/htdocs/ogre-vsd/
